<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;display:flex;flex-direction:column;gap:14px}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .sw{height:64px;border-radius:10px;display:flex;align-items:flex-end;padding:8px;font:500 11px/1.2 var(--font-mono);color:#0E0E0F;border:1px solid var(--border)}
  .hex{font:500 11px/1.2 var(--font-mono);color:var(--fg-muted);margin-top:2px}
</style></head><body>
<div class="t-micro">Paper — light surface scale</div>
<div class="row">
  <div><div class="sw" style="background:var(--paper-50)">50</div><div class="hex">#FAF7F1</div></div>
  <div><div class="sw" style="background:var(--paper-100)">100</div><div class="hex">#F4F1EA</div></div>
  <div><div class="sw" style="background:var(--paper-200)">200</div><div class="hex">#E8E4DA</div></div>
  <div><div class="sw" style="background:var(--paper-300)">300</div><div class="hex">#D4CFC2</div></div>
</div>
</body></html>
