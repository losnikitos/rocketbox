<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;display:flex;flex-direction:column;gap:12px}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .b{padding:14px 16px;font:600 14px/1.3 var(--font-body)}
</style></head><body>
<div class="t-micro">Signal callouts — flat fills only</div>
<div class="row">
  <div class="b" style="background:var(--signal-green);color:var(--on-green)">Do this. It works.</div>
  <div class="b" style="background:var(--signal-red);color:var(--on-red)">Don't. Common trap.</div>
  <div class="b" style="background:var(--signal-yellow);color:var(--on-yellow)">Read this carefully.</div>
  <div class="b" style="background:var(--signal-pink);color:var(--on-pink)">Side-note, optional.</div>
</div>
<div class="t-caption">Green · Red · Yellow · Pink. Used as full-width side-by-side blocks in book contents, comparison tables, webinar pages.</div>
</body></html>
