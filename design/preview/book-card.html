<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px}
  .card{background:var(--ink-800);border:1px solid var(--border);border-radius:18px;padding:20px;display:grid;grid-template-columns:120px 1fr auto;gap:20px;align-items:center;max-width:640px}
  .cover{width:120px;height:160px;border-radius:8px;background:#FFD400;display:flex;align-items:flex-end;padding:12px;color:#0E0E0F;font:800 18px/0.95 var(--font-display);letter-spacing:-0.02em}
  .meta{display:flex;flex-direction:column;gap:6px}
  .title{font:800 22px/1.1 var(--font-display);letter-spacing:-0.02em;color:var(--fg)}
  .blurb{font:500 14px/1.4 var(--font-body);color:var(--fg-muted)}
  .price{font:600 14px/1 var(--font-mono);background:var(--paper);color:var(--ink-900);border-radius:999px;padding:8px 12px}
</style></head><body>
<div class="card">
  <div class="cover">Hiring your first support rep.</div>
  <div class="meta">
    <span class="t-micro">Book 07 · 64 pages</span>
    <div class="title">Hiring your first support rep.</div>
    <div class="blurb">When and who to hire, how to write the brief, what the first 30 days look like.</div>
  </div>
  <span class="price">$24</span>
</div>
</body></html>
