<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px;display:flex;gap:48px;align-items:center;background:var(--ink-900)}
  .card{width:160px;height:110px;background:var(--ink-800);border-radius:18px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font:600 13px/1 var(--font-body);color:var(--fg)}
  .col{display:flex;flex-direction:column;gap:10px;align-items:center}
  .lbl{font:500 11px/1.3 var(--font-mono);color:var(--fg-muted);text-align:center}
</style></head><body>
<div class="col"><div class="card" style="box-shadow:var(--shadow-card)">--shadow-card</div><div class="lbl">books · lifted cards</div></div>
<div class="col"><div class="card" style="box-shadow:var(--shadow-pop)">--shadow-pop</div><div class="lbl">modals · focused covers</div></div>
<div class="t-caption" style="max-width:200px">Two elevations, both subtle. Buttons never carry shadow.</div>
</body></html>
