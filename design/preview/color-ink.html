<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;display:flex;flex-direction:column;gap:14px}
  .row{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
  .sw{height:64px;border-radius:10px;display:flex;align-items:flex-end;padding:8px;font:500 11px/1.2 var(--font-mono);color:#F4F1EA}
  .sw.light{color:#0E0E0F}
  .lbl{font:600 12px/1 var(--font-body);color:var(--fg)}
  .hex{font:500 11px/1.2 var(--font-mono);color:var(--fg-muted);margin-top:2px}
</style></head><body>
<div class="t-micro">Ink — dark surface scale</div>
<div class="row">
  <div><div class="sw" style="background:var(--ink-900)">900</div><div class="hex">#0E0E0F</div></div>
  <div><div class="sw" style="background:var(--ink-800)">800</div><div class="hex">#17171A</div></div>
  <div><div class="sw" style="background:var(--ink-700)">700</div><div class="hex">#222226</div></div>
  <div><div class="sw" style="background:var(--ink-600)">600</div><div class="hex">#2E2E33</div></div>
  <div><div class="sw" style="background:var(--ink-500)">500</div><div class="hex">#4A4A52</div></div>
  <div><div class="sw light" style="background:var(--ink-400)">400</div><div class="hex">#6E6E78</div></div>
  <div><div class="sw light" style="background:var(--ink-300)">300</div><div class="hex">#9A9AA3</div></div>
</div>
</body></html>
