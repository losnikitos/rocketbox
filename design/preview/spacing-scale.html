<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px}
  .row{display:flex;align-items:flex-end;gap:14px}
  .b{background:var(--rocket);border-radius:4px;width:32px}
  .lbl{font:500 11px/1 var(--font-mono);color:var(--fg-muted);margin-top:6px;text-align:center}
  .col{display:flex;flex-direction:column;align-items:center}
</style></head><body>
<div class="t-micro" style="margin-bottom:14px">Spacing scale — 8px base</div>
<div class="row">
  <div class="col"><div class="b" style="height:4px"></div><div class="lbl">4<br>--s-1</div></div>
  <div class="col"><div class="b" style="height:8px"></div><div class="lbl">8<br>--s-2</div></div>
  <div class="col"><div class="b" style="height:12px"></div><div class="lbl">12<br>--s-3</div></div>
  <div class="col"><div class="b" style="height:16px"></div><div class="lbl">16<br>--s-4</div></div>
  <div class="col"><div class="b" style="height:24px"></div><div class="lbl">24<br>--s-5</div></div>
  <div class="col"><div class="b" style="height:32px"></div><div class="lbl">32<br>--s-6</div></div>
  <div class="col"><div class="b" style="height:48px"></div><div class="lbl">48<br>--s-8</div></div>
  <div class="col"><div class="b" style="height:64px"></div><div class="lbl">64<br>--s-10</div></div>
  <div class="col"><div class="b" style="height:96px"></div><div class="lbl">96<br>--s-12</div></div>
</div>
</body></html>
