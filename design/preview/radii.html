<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;display:flex;gap:32px;align-items:center}
  .demo{width:140px;height:90px;background:var(--ink-700);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font:600 14px/1 var(--font-body);color:var(--fg)}
  .col{display:flex;flex-direction:column;gap:8px;align-items:center}
  .lbl{font:500 11px/1.3 var(--font-mono);color:var(--fg-muted);text-align:center}
</style></head><body>
<div class="col"><div class="demo" style="border-radius:10px">10</div><div class="lbl">--r-control<br>buttons · inputs · chips</div></div>
<div class="col"><div class="demo" style="border-radius:18px">18</div><div class="lbl">--r-card<br>books · cards · tiles</div></div>
<div class="col"><div class="demo" style="border-radius:999px;width:90px">999</div><div class="lbl">--r-pill<br>price chip only</div></div>
<div class="t-caption" style="max-width:200px;margin-left:auto">Two radii, plus one full-pill reserved for the book price chip. No 24px+ rounding.</div>
</body></html>
